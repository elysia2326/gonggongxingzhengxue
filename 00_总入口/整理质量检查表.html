<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>整理质量检查表</title>
  <link rel="stylesheet" href="../assets/style.css">
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="crumbs"><a href="../index.html">首页</a> / 整理质量检查表</div>
      <div class="crumbs">公共行政学期末复习</div>
    </div>
    <div class="page">
      <p class="footer-note"><a href="../index.html">返回首页</a></p>
      <div class="note-body">
        <h1 id="整理质量检查表">整理质量检查表</h1>
<h2 id="1-内容完整性">1. 内容完整性</h2>
<ul class="task-list">
<li><label><input type="checkbox" />是否覆盖教材核心内容？</label></li>
<li><label><input type="checkbox" />是否覆盖课件重点？</label></li>
<li><label><input type="checkbox" />是否覆盖章后关键概念？</label></li>
<li><label><input type="checkbox" />是否覆盖章后问题或复习题？</label></li>
<li><label><input type="checkbox" />是否提取本章重要理论？</label></li>
<li><label><input type="checkbox" />是否服务单项选择、简答、论述、案例分析四类题型？</label></li>
</ul>
<h2 id="2-考试适配度">2. 考试适配度</h2>
<ul class="task-list">
<li><label><input type="checkbox" />简答题是否分点清楚？</label></li>
<li><label><input type="checkbox" />论述题是否有中心论点和展开逻辑？</label></li>
<li><label><input type="checkbox" />案例分析是否有理论框架？</label></li>
<li><label><input type="checkbox" />单选题是否提取了易混点和判断标准？</label></li>
<li><label><input type="checkbox" />是否有背诵版？</label></li>
<li><label><input type="checkbox" />是否有压缩版？</label></li>
</ul>
<h2 id="3-准确性">3. 准确性</h2>
<ul class="task-list">
<li><label><input type="checkbox" />是否严格依据材料？</label></li>
<li><label><input type="checkbox" />是否区分教材、课件和复习推断？</label></li>
<li><label><input type="checkbox" />是否避免编造材料没有出现的内容？</label></li>
<li><label><input type="checkbox" />是否避免概念混淆？</label></li>
<li><label><input type="checkbox" />是否标出材料不足之处？</label></li>
</ul>
<h2 id="4-表达质量">4. 表达质量</h2>
<ul class="task-list">
<li><label><input type="checkbox" />是否适合直接背诵？</label></li>
<li><label><input type="checkbox" />是否适合考试作答？</label></li>
<li><label><input type="checkbox" />是否避免空话套话？</label></li>
<li><label><input type="checkbox" />是否有逻辑层次？</label></li>
<li><label><input type="checkbox" />是否能体现理解深度？</label></li>
</ul>
<h2 id="5-obsidian-归档">5. Obsidian 归档</h2>
<ul class="task-list">
<li><label><input type="checkbox" />文件名是否统一？</label></li>
<li><label><input type="checkbox" />理论名称是否统一？</label></li>
<li><label><input type="checkbox" />章节文件是否完整？</label></li>
<li><label><input type="checkbox" />老师题库是否保持独立？</label></li>
<li><label><input type="checkbox" />题库答案是否和章节知识点相互链接？</label></li>
<li><label><input type="checkbox" />案例分析模板是否链接到具体理论？</label></li>
<li><label><input type="checkbox" />概念总表是否链接到章节和理论？</label></li>
<li><label><input type="checkbox" />是否保留原始材料，方便回溯？</label></li>
</ul>

      </div>
    </div>
  </div>
</body>
</html>
